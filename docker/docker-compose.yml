services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU18-ubuntu-22.04

    container_name: printflow-sqlserver

    restart: always

    ports:
      - "${SQLSERVER_PORT:-1434}:1433"

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}

    volumes:
      - sqlserver-data:/var/opt/mssql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pidof sqlservr || exit 1"
        ]
      interval: 20s
      timeout: 10s
      retries: 10

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - printflow

  backend:

    build:
      context: ../Backend
      dockerfile: Dockerfile
      target: runtime
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}

    container_name: printflow-api

    restart: always

    ports:
      - "${BACKEND_PORT:-8081}:8080"

    depends_on:
      sqlserver:
        condition: service_healthy

    environment:

      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}

      ASPNETCORE_URLS: http://+:8080

      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=PrintFlow3D;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True;

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}

      Frontend__BaseUrl: ${FRONTEND_BASE_URL}
      ClientPortal__FrontendBaseUrl: ${FRONTEND_BASE_URL}

      Mail__Smtp__Host: ${SMTP_HOST}
      Mail__Smtp__Port: ${SMTP_PORT:-587}
      Mail__Smtp__Username: ${SMTP_USERNAME}
      Mail__Smtp__Password: ${SMTP_PASSWORD}
      Mail__Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Mail__Smtp__FromName: ${SMTP_FROM_NAME:-3D Inspire}
      Mail__Smtp__EnableSsl: ${SMTP_ENABLE_SSL:-true}

      Database__ApplyMigrationsOnStartup: ${APPLY_MIGRATIONS}

    volumes:
      - uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://localhost:8080/health || exit 1"
        ]
      interval: 20s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - printflow

  frontend:

    build:
      context: ../Frontend
      dockerfile: Dockerfile
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}

    container_name: printflow-frontend

    restart: always

    ports:
      - "${FRONTEND_PORT:-8082}:80"

    depends_on:
      backend:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

    networks:
      - printflow

volumes:

  sqlserver-data:

  uploads:

networks:

  printflow:
