############################################################
# GestionImpression3D
# GitLab CI/CD - Version 3.3 (Optimisée & Épurée)
############################################################

stages:
  - test
  - docker
  - deploy
  - verify

default:
  tags:
    - local-runner
  interruptible: true

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*$/'
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - if: '$CI_COMMIT_BRANCH == "main"'

variables:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget/packages/
    - Frontend/.npm/

# Variables Docker tag branch-specific définies directement dans chaque job

############################################################
# STAGE: TEST
############################################################

tests:
  stage: test
  script:
    - echo "Running backend tests"
    - dotnet restore TestProject\TestProject.csproj
    - dotnet test TestProject\TestProject.csproj --configuration Release --no-restore
    - echo "Running frontend tests"
    - cd Frontend
    - npm ci --cache .npm
    - npm test -- --watch=false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" || $CI_COMMIT_BRANCH =~ /^(dev|staging|main)$/ '
      changes:
        - Backend/**/*
        - TestProject/**/*
        - Frontend/**/*
        - Frontend/package*.json
        - .gitlab-ci.yml
    - when: never

############################################################
# STAGE: DOCKER
############################################################

docker-backend:
  stage: docker
  needs:
    - tests
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - Backend/**/*
        - TestProject/**/*
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "staging"'
      changes:
        - Backend/**/*
        - TestProject/**/*
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - Backend/**/*
        - TestProject/**/*
        - .gitlab-ci.yml
    - when: never
  script:
    - docker build -f Backend/Dockerfile -t "backend:$CI_COMMIT_SHORT_SHA" .
    - if ($env:CI_COMMIT_BRANCH -eq "dev") { $env:TARGET_TAG = "dev" } elseif ($env:CI_COMMIT_BRANCH -eq "staging") { $env:TARGET_TAG = "staging" } elseif ($env:CI_COMMIT_BRANCH -eq "main") { $env:TARGET_TAG = "latest" } else { $env:TARGET_TAG = $env:CI_COMMIT_SHORT_SHA }
    - docker tag "backend:$CI_COMMIT_SHORT_SHA" "backend:$env:TARGET_TAG"

docker-frontend:
  stage: docker
  needs:
    - tests
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      changes:
        - Frontend/**/*
        - Frontend/package*.json
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "staging"'
      changes:
        - Frontend/**/*
        - Frontend/package*.json
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - Frontend/**/*
        - Frontend/package*.json
        - .gitlab-ci.yml
    - when: never
  script:
    - docker build -f Frontend/Dockerfile -t "frontend:$CI_COMMIT_SHORT_SHA" Frontend
    - if ($env:CI_COMMIT_BRANCH -eq "dev") { $env:TARGET_TAG = "dev" } elseif ($env:CI_COMMIT_BRANCH -eq "staging") { $env:TARGET_TAG = "staging" } elseif ($env:CI_COMMIT_BRANCH -eq "main") { $env:TARGET_TAG = "latest" } else { $env:TARGET_TAG = $env:CI_COMMIT_SHORT_SHA }
    - docker tag "frontend:$CI_COMMIT_SHORT_SHA" "frontend:$env:TARGET_TAG"

############################################################
# STAGE: DEPLOY
############################################################

deploy-dev:
  stage: deploy
  needs:
    - docker-backend
    - docker-frontend
  environment:
    name: development
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - Copy-Item "$env:CI_PROJECT_DIR\env\.env.dev" "$env:CI_PROJECT_DIR\.env" -Force
    - Add-Content "$env:CI_PROJECT_DIR\.env" "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"
    - Set-Location $env:CI_PROJECT_DIR
    - docker compose --env-file .env -f docker\docker-compose.yml -f docker\docker-compose.dev.yml up -d --pull always --remove-orphans

deploy-staging:
  stage: deploy
  needs:
    - docker-backend
    - docker-frontend
  environment:
    name: staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'
  script:
    - Copy-Item "$env:CI_PROJECT_DIR\env\.env.staging" "$env:CI_PROJECT_DIR\.env" -Force
    - Add-Content "$env:CI_PROJECT_DIR\.env" "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"
    - Set-Location $env:CI_PROJECT_DIR
    - docker compose --env-file .env -f docker\docker-compose.yml -f docker\docker-compose.staging.yml up -d --pull always --remove-orphans

deploy-prod:
  stage: deploy
  resource_group: production
  needs:
    - docker-backend
    - docker-frontend
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - Copy-Item "$env:CI_PROJECT_DIR\env\.env.prod" "$env:CI_PROJECT_DIR\.env" -Force
    - Add-Content "$env:CI_PROJECT_DIR\.env" "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"
    - Set-Location $env:CI_PROJECT_DIR
    - docker compose --env-file .env -f docker\docker-compose.yml -f docker\docker-compose.prod.yml up -d --pull always --remove-orphans

############################################################
# STAGE: VERIFY & RECOVERY
############################################################

verify-dev:
  stage: verify
  needs:
    - deploy-dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - Set-Location $env:CI_PROJECT_DIR
    - $i=0; while($i -lt 30 -and (Invoke-WebRequest http://localhost:5000/health -UseBasicParsing).StatusCode -ne 200) { Start-Sleep 2; $i++ }
    - if($i -eq 30) { throw "HealthCheck DEV failed." }

verify-staging:
  stage: verify
  needs:
    - deploy-staging
  rules:
    - if: '$CI_COMMIT_BRANCH == "staging"'
  script:
    - Set-Location $env:CI_PROJECT_DIR
    - $i=0; while($i -lt 30 -and (Invoke-WebRequest http://localhost:5001/health -UseBasicParsing).StatusCode -ne 200) { Start-Sleep 2; $i++ }
    - if($i -eq 30) { throw "HealthCheck STAGING failed." }

verify-prod:
  stage: verify
  needs:
    - deploy-prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - Set-Location $env:CI_PROJECT_DIR
    - $i=0; while($i -lt 30 -and (Invoke-WebRequest http://localhost:5002/health -UseBasicParsing).StatusCode -ne 200) { Start-Sleep 2; $i++ }
    - if($i -eq 30) { throw "Application indisponible." }

rollback-prod:
  stage: verify
  needs:
    - verify-prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_failure
  script:
    - Set-Location $env:CI_PROJECT_DIR
    - powershell .\rollback.ps1 latest