############################################################
# GestionImpression3D
# GitLab CI/CD - Version 3.2 (Conforme Arborescence)
############################################################

stages:
  - test
  - docker
  - migrate
  - deploy
  - verify

default:
  tags:
    - local-runner
  interruptible: true

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature\/.*$/'
    - if: '$CI_COMMIT_BRANCH == "dev"'
    - if: '$CI_COMMIT_BRANCH == "staging"'
    - if: '$CI_COMMIT_BRANCH == "main"'

variables:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  NUGET_PACKAGES: "$CI_PROJECT_DIR/.nuget/packages"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .nuget/packages/
    - Frontend/.npm/

############################################################
# STAGE: TEST
############################################################

backend-test:
  stage: test
  script:
    - dotnet restore Backend\Backend.csproj
    - dotnet test Backend\Backend.csproj --configuration Release --logger "trx;LogFileName=backend.trx"
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - Backend\TestResults
  rules:
    - when: always

frontend-test:
  stage: test
  script:
    - cd Frontend
    - npm ci --cache .npm
    - npm test -- --watch=false
    - npm run build
  rules:
    - when: always

############################################################
# STAGE: DOCKER (Optimisé sans structures IF/ELSE complexes)
############################################################

docker-backend:
  stage: docker
  needs:
    - backend-test
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      variables: { TARGET_TAG: "dev" }
    - if: '$CI_COMMIT_BRANCH == "staging"'
      variables: { TARGET_TAG: "staging" }
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables: { TARGET_TAG: "latest" }
  script:
    - echo $env:CI_REGISTRY_PASSWORD | docker login $env:CI_REGISTRY --username $env:CI_REGISTRY_USER --password-stdin
    - docker build -f Backend/Dockerfile -t "$env:CI_REGISTRY_IMAGE/backend:$env:CI_COMMIT_SHORT_SHA" .
    - docker tag "$env:CI_REGISTRY_IMAGE/backend:$env:CI_COMMIT_SHORT_SHA" "$env:CI_REGISTRY_IMAGE/backend:$env:TARGET_TAG"
    - docker push "$env:CI_REGISTRY_IMAGE/backend:$env:CI_COMMIT_SHORT_SHA"
    - docker push "$env:CI_REGISTRY_IMAGE/backend:$env:TARGET_TAG"

docker-frontend:
  stage: docker
  needs:
    - frontend-test
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
      variables: { TARGET_TAG: "dev" }
    - if: '$CI_COMMIT_BRANCH == "staging"'
      variables: { TARGET_TAG: "staging" }
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables: { TARGET_TAG: "latest" }
  script:
    - echo $env:CI_REGISTRY_PASSWORD | docker login $env:CI_REGISTRY --username $env:CI_REGISTRY_USER --password-stdin
    - docker build -f Frontend/Dockerfile -t "$env:CI_REGISTRY_IMAGE/frontend:$env:CI_COMMIT_SHORT_SHA" .
    - docker tag "$env:CI_REGISTRY_IMAGE/frontend:$env:CI_COMMIT_SHORT_SHA" "$env:CI_REGISTRY_IMAGE/frontend:$env:TARGET_TAG"
    - docker push "$env:CI_REGISTRY_IMAGE/frontend:$env:CI_COMMIT_SHORT_SHA"
    - docker push "$env:CI_REGISTRY_IMAGE/frontend:$env:TARGET_TAG"

############################################################
# STAGE: MIGRATE
############################################################

migrate-dev:
  stage: migrate
  needs:
    - docker-backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - Copy-Item C:\PrintFlow3D\env\.env.dev C:\PrintFlow3D\.env -Force
    - Add-Content C:\PrintFlow3D\.env "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"
    - Set-Location C:\PrintFlow3D
    - docker compose --env-file .env -f docker\docker-compose.yml -f docker\docker-compose.dev.yml run --rm backend dotnet ef database update

############################################################
# STAGE: DEPLOY
############################################################

deploy-dev:
  stage: deploy
  needs:
    - migrate-dev
    - docker-frontend
  environment:
    name: development
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - Set-Location C:\PrintFlow3D
    - docker compose --env-file .env -f docker\docker-compose.yml -f docker\docker-compose.dev.yml up -d --pull always --remove-orphans

deploy-prod:
  stage: deploy
  resource_group: production
  needs:
    - docker-backend
    - docker-frontend
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - Copy-Item C:\PrintFlow3D\env\.env.prod C:\PrintFlow3D\.env -Force
    - Add-Content C:\PrintFlow3D\.env "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"
    - Set-Location C:\PrintFlow3D
    - docker compose --env-file .env -f docker\docker-compose.yml -f docker\docker-compose.prod.yml up -d --pull always --remove-orphans

############################################################
# STAGE: VERIFY & RECOVERY
############################################################

verify-dev:
  stage: verify
  needs:
    - deploy-dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'
  script:
    - |
      $ok=$false
      for($i=0;$i -lt 30;$i++) {
          try {
              $r=Invoke-WebRequest http://localhost:5000/health -UseBasicParsing
              if($r.StatusCode -eq 200) { $ok=$true; break }
          } catch {}
          Start-Sleep 2
      }
      if(-not $ok) { throw "HealthCheck DEV failed." }

verify-prod:
  stage: verify
  needs:
    - deploy-prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - |
      $Healthy=$false
      for($i=0;$i -lt 30;$i++) {
          try {
              $r=Invoke-WebRequest http://localhost:5002/health -UseBasicParsing
              if($r.StatusCode -eq 200) { $Healthy=$true; break }
          } catch {}
          Start-Sleep 2
      }
      if(-not $Healthy) { throw "Application indisponible." }

rollback-prod:
  stage: verify
  when: on_failure
  needs:
    - verify-prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - Set-Location C:\PrintFlow3D
    - powershell .\rollback.ps1 latest