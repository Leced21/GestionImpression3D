<div class="register-container">
    <div class="register-card">
        <img class="logo" src="logo.png" alt="3D Inspire">
        <h2>Réinitialiser le mot de passe</h2>

        <form (ngSubmit)="onSubmit()" *ngIf="hasToken && !successMessage">
            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" [(ngModel)]="newPassword" name="newPassword" required>
                <small class="password-hint">Au moins 8 caractères, avec majuscule, minuscule, chiffre et caractère spécial (@$!%*?&)</small>
            </div>

            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required>
            </div>

            <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">
                {{ isLoading ? 'Réinitialisation...' : 'Réinitialiser' }}
            </button>
        </form>

        <div class="error" *ngIf="!hasToken">{{ errorMessage }}</div>
        <div class="success" *ngIf="successMessage">{{ successMessage }}</div>

        <p class="login-link">
            <a routerLink="/login">Retour à la connexion</a>
        </p>
    </div>
</div>
