<header class="header">
    <div class="header-left">
        <img class="logo" src="logo.png" alt="3D Inspire">
    </div>

    <div class="header-right">
        <button class="help-btn" type="button" (click)="startOnboarding()" title="Revoir le guide de l'application">?</button>
        <!-- Notification Bell en haut -->
        <div class="notification-area">
            <app-notification-bell></app-notification-bell>
        </div>
        <div class="user-menu" (click)="toggleMenu()">
            <div class="user-avatar">{{ getUserInitials() }}</div>
            <span class="user-name">{{ currentUser?.prenom }} {{
                currentUser?.nom }}</span>
            <span class="dropdown-arrow">▼</span>
        </div>

        <div class="dropdown-menu" *ngIf="menuOpen">
            <div class="dropdown-item">
                <strong>{{ currentUser?.email }}</strong>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" (click)="logout()">
                🚪 {{ 'header.logout' | translate }}
            </div>
        </div>
    </div>
</header>
