<div class="form-container">
    <div class="form-header">
        <button class="btn-back" routerLink="/consommations">← Retour</button>
        <h1>➕ Nouvelle consommation</h1>
    </div>

    <form [formGroup]="consumptionForm" (ngSubmit)="onSubmit()">
        <div class="form-section">
            <h3>📦 Matériau</h3>
            <div class="form-group">
                <label>Matériau *</label>
                <select formControlName="materialStockId"
                    (change)="onMaterialChange()">
                    <option value>-- Sélectionner un matériau --</option>
                    <option *ngFor="let material of materials"
                        [value]="material.id">
                        {{ material.name }} - {{ material.color }} (Stock: {{
                        material.quantity }} {{ material.unitLabel }})
                    </option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Quantité * ({{ selectedUnit }})</label>
                    <input type="number" formControlName="quantity" step="0.1"
                        min="0.1">
                </div>
                <div class="form-group">
                    <label>Type *</label>
                    <select formControlName="type">
                        <option value="Production">🏭 Production</option>
                        <option value="Test">🧪 Test</option>
                        <option value="Waste">⚠️ Perte</option>
                        <option value="Maintenance">🔧 Maintenance</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Raison</label>
                <input type="text" formControlName="reason"
                    placeholder="Optionnel">
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea formControlName="notes" rows="3"
                    placeholder="Informations complémentaires..."></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn-secondary"
                routerLink="/consommations">Annuler</button>
            <button type="submit" class="btn-primary"
                [disabled]="consumptionForm.invalid">Enregistrer</button>
        </div>
    </form>
</div>
