<div class="accept-container">
    <div class="accept-card">
        <div class="logo">🖨️ PrintFlow3D</div>
        <h2>Acceptation d'invitation</h2>

        <div *ngIf="isValidating" class="loading">Vérification de
            l'invitation...</div>

        <div *ngIf="!isValidating && !isValid" class="error">
            ❌ Invitation invalide ou expirée
        </div>

        <form *ngIf="!isValidating && isValid" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label>Prénom</label>
                <input type="text" [(ngModel)]="prenom" name="prenom" required>
            </div>

            <div class="form-group">
                <label>Nom</label>
                <input type="text" [(ngModel)]="nom" name="nom" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" [(ngModel)]="password" name="password"
                    required>
            </div>

            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" [(ngModel)]="confirmPassword"
                    name="confirmPassword" required>
            </div>

            <div class="error" *ngIf="error">{{ error }}</div>

            <button type="submit" class="btn-primary" [disabled]="isSubmitting">
                {{ isSubmitting ? 'Inscription...' : 'Créer mon compte' }}
            </button>
        </form>
    </div>
</div>
