docker-backend:

  stage: docker

  needs:

    - tests

  script:

    - if ($env:CI_JOB_TOKEN) { echo $env:CI_JOB_TOKEN | docker login $env:CI_REGISTRY --username $env:CI_REGISTRY_USER --password-stdin } else { echo $env:CI_REGISTRY_PASSWORD | docker login $env:CI_REGISTRY --username $env:CI_REGISTRY_USER --password-stdin }

    - docker build `
        -f Backend/Dockerfile `
        -t "$env:CI_REGISTRY_IMAGE/backend:$env:CI_COMMIT_SHORT_SHA" `
        .

    - docker push `
        "$env:CI_REGISTRY_IMAGE/backend:$env:CI_COMMIT_SHORT_SHA"

  rules:

    - if: '$CI_COMMIT_BRANCH == "dev"'

    - if: '$CI_COMMIT_BRANCH == "staging"'

    - if: '$CI_COMMIT_BRANCH == "main"'

docker-frontend:

  stage: docker

  needs:

    - tests

  script:

    - if ($env:CI_JOB_TOKEN) { echo $env:CI_JOB_TOKEN | docker login $env:CI_REGISTRY --username $env:CI_REGISTRY_USER --password-stdin } else { echo $env:CI_REGISTRY_PASSWORD | docker login $env:CI_REGISTRY --username $env:CI_REGISTRY_USER --password-stdin }

    - docker build `
        -f Frontend/Dockerfile `
        -t "$env:CI_REGISTRY_IMAGE/frontend:$env:CI_COMMIT_SHORT_SHA" `
        .

    - docker push `
        "$env:CI_REGISTRY_IMAGE/frontend:$env:CI_COMMIT_SHORT_SHA"

  rules:

    - if: '$CI_COMMIT_BRANCH == "dev"'

    - if: '$CI_COMMIT_BRANCH == "staging"'

    - if: '$CI_COMMIT_BRANCH == "main"'