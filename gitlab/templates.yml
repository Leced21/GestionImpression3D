default:
  tags:
    - local-runner

interruptible: true

cache:
  key: "$CI_COMMIT_REF_SLUG"

  paths:
    - .nuget/packages/
    - Frontend/node_modules/

.dotnet:

  before_script:

    - dotnet --info

.node:

  before_script:

    - node --version
    - npm --version

.docker:

  before_script:

    - docker version

    - docker login `
        $env:CI_REGISTRY `
        -u $env:CI_REGISTRY_USER `
        -p $env:CI_REGISTRY_PASSWORD