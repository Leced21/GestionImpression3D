deploy-dev:

  extends:
    - .docker

  stage: deploy

  needs:
    - docker-backend
    - docker-frontend

  environment:
    name: development

  rules:
    - if: '$CI_COMMIT_BRANCH=="dev"'

  script:

    - docker compose `
        --env-file docker/.env.dev `
        -f docker/docker-compose.yml `
        -f docker/docker-compose.dev.yml `
        pull

    - docker compose `
        --env-file docker/.env.dev `
        -f docker/docker-compose.yml `
        -f docker/docker-compose.dev.yml `
        up -d

    - docker image prune -f



