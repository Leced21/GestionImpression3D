deploy-dev:

  stage: deploy

  needs:
    - docker-backend
    - docker-frontend

  environment:
    name: development

  rules:
    - if: '$CI_COMMIT_BRANCH=="dev"'

  script:

    - Copy-Item C:\PrintFlow3D\env\.env.dev C:\PrintFlow3D\.env -Force

    - Add-Content C:\PrintFlow3D\.env "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"

    - Set-Location C:\PrintFlow3D

    - docker compose `
        -f docker\docker-compose.yml `
        -f docker\docker-compose.dev.yml `
        up -d --pull always --remove-orphans

    - powershell -ExecutionPolicy Bypass scripts\healthcheck.ps1 http://localhost:5000/health



deploy-staging:

  stage: deploy

  needs:
    - docker-backend
    - docker-frontend

  environment:
    name: staging

  rules:
    - if: '$CI_COMMIT_BRANCH=="staging"'

  script:

    - Copy-Item C:\PrintFlow3D\env\.env.staging C:\PrintFlow3D\.env -Force

    - Add-Content C:\PrintFlow3D\.env "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"

    - Set-Location C:\PrintFlow3D

    - docker compose `
        -f docker\docker-compose.yml `
        -f docker\docker-compose.staging.yml `
        up -d --pull always --remove-orphans

    - powershell -ExecutionPolicy Bypass scripts\healthcheck.ps1 http://localhost:5001/health


deploy-prod:

  stage: deploy

  resource_group: production

  when: manual

  needs:
    - docker-backend
    - docker-frontend

  environment:
    name: production

  rules:
    - if: '$CI_COMMIT_BRANCH=="main"'

  script:

    - powershell -ExecutionPolicy Bypass scripts\backup.ps1

    - Copy-Item C:\PrintFlow3D\env\.env.prod C:\PrintFlow3D\.env -Force

    - Add-Content C:\PrintFlow3D\.env "IMAGE_TAG=$env:CI_COMMIT_SHORT_SHA"

    - Set-Location C:\PrintFlow3D

    - docker compose `
        -f docker\docker-compose.yml `
        -f docker\docker-compose.prod.yml `
        up -d --pull always --remove-orphans

    - powershell -ExecutionPolicy Bypass scripts\healthcheck.ps1 http://localhost:5002/health