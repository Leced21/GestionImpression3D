deploy-prod:

  extends:
    - .docker

  stage: deploy

  needs:
    - docker-backend
    - docker-frontend

  environment:
    name: production

  when: manual

  rules:
    - if: '$CI_COMMIT_BRANCH=="main"'

  script:

    - docker compose `
        --env-file docker/.env.prod `
        -f docker/docker-compose.yml `
        -f docker/docker-compose.prod.yml `
        pull

    - docker compose `
        --env-file docker/.env.prod `
        -f docker/docker-compose.yml `
        -f docker/docker-compose.prod.yml `
        up -d

    - docker image prune -f